# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── MySQL Datasource (Railway free tier) ──────────────────────────────────────
# For local development, use your local MySQL.
# For Render/Railway deployment, set DATABASE_URL environment variable.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/mindscan_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:mindscan}
spring.datasource.password=${DB_PASSWORD:mindscan123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (important for Render free tier)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:bWluZHNjYW5fc3VwZXJfc2VjcmV0X2tleV8yMDI0X3Byb2R1Y3Rpb25fc2Vj}
jwt.expiration-ms=86400000

# ── ML Service ─────────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ── CORS (allow Android app) ───────────────────────────────────────────────────
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.mindscan=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Actuator (health check for Render) ────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
